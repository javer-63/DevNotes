<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${post.title}">Post</title>
    <th:block th:replace="~{fragments/head :: head}"/>
    <link rel="canonical" th:href="@{'/posts/' + ${post.url}}"/>
</head>
<body class="post-page">
<th:block th:replace="~{fragments/header :: header}"/>
<div class="page-wrapper">
    <div class="container">
        <div class="page-container">
            <article th:object="${post}" class="card shadow-sm">
                <div class="card-body">
                    <h1 th:text="*{title}" class="post-title">Title</h1>
                    <div class="d-flex justify-content-between text-secondary font-monospace my-3">                        <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yy HH:mm')}">Дата</span>
                        <span th:text="*{views} + ' 👁'">0</span>
                        <span th:text="*{time} + ' мин'">0</span>
                    </div>
                    <div class="post-content mt-1" th:utext="*{content}">Содержание</div>
                </div>
                <a href="/posts" class="m-3 text-secondary text-decoration-none">← Все посты</a>
            </article>
            <div sec:authorize="hasRole('ADMIN')" class="mt-4">
                <div class="d-flex gap-2 btn-group">
                    <a th:href="@{'/posts/' + ${post.url} + '/edit'}" class="btn btn-outline-dark">
                        Редактировать
                    </a>
                    <form th:action="'/posts/' + ${post.url} + '/delete'" method="post" class="w-50">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger w-100"
                                onclick="return confirm('Удалить пост?')">
                            Удалить
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/footer :: footer}"/>
</body>
</html>
