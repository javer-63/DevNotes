<th:block th:fragment="header" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
    <header class="header">
            <div class="header-logo">
                <a href="/" class="logo-link">
                    <img class="logo-img" th:src="@{/img/DevNotes.png}" src="/img/DevNotes.png">
                </a>
            </div>
            <div class="header-menu">
                <a class="btn" href="/posts">Все посты</a>
                <a class="btn" href="http://github.com/javer-63/DevNotes">О проекте</a>
                <a class="btn" href="/admin" sec:authorize="isAnonymous()">Вход (админ)</a>
                <a class="btn" href="/posts/new" sec:authorize="hasRole('ADMIN')">Новый пост</a>
                <a class="btn" href="/admin" sec:authorize="hasRole('ADMIN')">Админка</a>
                <form th:action="@{/logout}" method="post" sec:authorize="hasRole('ADMIN')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-logout btn">Выйти</button>
                </form>
            </div>
    </header>
</th:block>
