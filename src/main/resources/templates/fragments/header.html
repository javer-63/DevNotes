<th:block th:fragment="header" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar navbar-expand bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img th:src="@{/DevNotes.png}" alt="DevNotes" height="32">
            </a>
            <div class="navbar-nav gap-1">
                <a class="btn btn-outline-dark" href="/posts">Все посты</a>
                <a class="btn btn-outline-dark" href="https://github.com/javer-63/DevNotes">О проекте</a>
                <a class="btn btn-outline-dark" href="/admin" sec:authorize="isAnonymous()">Вход (админ)</a>
                <a class="btn btn-outline-dark" href="/posts/new" sec:authorize="hasRole('ADMIN')">Новый пост</a>
                <a class="btn btn-outline-dark" href="/admin" sec:authorize="hasRole('ADMIN')">Админка</a>
                <form th:action="@{/logout}" method="post" sec:authorize="hasRole('ADMIN')" class="mb-0">
                    <button type="submit" class="btn btn-outline-danger">Выйти</button>
                </form>
            </div>
        </div>
    </nav>
</th:block>
