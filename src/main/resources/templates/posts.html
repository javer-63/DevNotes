<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Все посты</title>
    <th:block th:replace="~{fragments/head :: head}"/>
    <link rel="canonical" th:href="${canonicalUrl}"/>
    <link rel="prev" th:if="${prevUrl != null}" th:href="${prevUrl}"/>
    <link rel="next" th:if="${nextUrl != null}" th:href="${nextUrl}"/>
</head>
<body class="posts-page">
<th:block th:replace="~{fragments/header :: header}"/>
<div class="content-wrapper">
    <div class="container">
        <div class="post-container">
            <section>
                <article th:each="post : ${posts}" class="card shadow-sm mb-3">
                    <div class="card-body">
                        <h2 class="card-title h5">
                            <a th:href="@{'/posts/' + ${post.url}}"
                               th:text="${post.title}" class="text-reset text-decoration-none">
                            </a>
                        </h2>
                        <p th:text="${post.description}" class="card-text text-secondary mt-2 mb-0"></p>
                    </div>
                </article>
            </section>
            <nav th:if="${totalPages > 1}" class="mt-4">
                <a th:if="${currentPage > 1}" class="btn btn-outline-dark"
                   th:href="${currentPage == 2 ? '/posts' : '/posts/page/' + (currentPage - 1)}">←</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <a th:if="${i != currentPage}" class="btn btn-outline-dark"
                       th:href="${i == 1 ? '/posts' : '/posts/page/' + i}" th:text="${i}"></a>
                    <strong th:if="${i == currentPage}" th:text="${i}" class="btn"></strong>
                </span>
                <a th:if="${currentPage < totalPages}" class="btn btn-outline-dark"
                   th:href="${'/posts/page/' + (currentPage + 1)}">→</a>
            </nav>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/footer :: footer}"/>
</body>
</html>
