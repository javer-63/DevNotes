<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все посты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/core.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
    <link rel="canonical" th:href="${canonicalUrl}"/>
    <link rel="prev" th:if="${currentPage > 1}" th:href="${prevUrl}"/>
    <link rel="next" th:if="${currentPage < totalPages}" th:href="${nextUrl}"/>
</head>
<body class="posts-page">
<th:block th:replace="~{fragments/header :: header}"/>
<div class="content-wrapper">
    <div class="container">
        <div class="post-container">
            <section>
                <article th:each="post : ${posts}" class="card p-4 mb-3">
                    <h2>
                        <a th:href="@{'/posts/' + ${post.url}}"
                           th:text="${post.title}">
                        </a>
                    </h2>
                    <p th:text="${post.description}" class="mt-2"></p>
                </article>
            </section>
            <nav th:if="${totalPages > 1}" class="mt-4 pagination">
                <a th:if="${currentPage > 1}"
                   th:href="${currentPage == 2 ? '/posts' : '/posts/page/' + (currentPage - 1)}"
                   class="btn">←</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}" class="mx-1">
                    <a th:if="${i != currentPage}"
                       th:href="${i == 1 ? '/posts' : '/posts/page/' + i}"
                       th:text="${i}"
                       class="btn">
                    </a>
                    <strong th:if="${i == currentPage}" th:text="${i}" class="btn"></strong>
                </span>
                <a th:if="${currentPage < totalPages}"
                   th:href="${'/posts/page/' + (currentPage + 1)}"
                   class="btn">→</a>
            </nav>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/footer :: footer}"/>
</body>
</html>
